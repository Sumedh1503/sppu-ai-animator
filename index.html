<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPPU AI Animator</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; text-align: center; padding: 20px; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0px 10px 30px rgba(0,0,0,0.1); max-width: 500px; margin: auto; }
        .input-group { margin-bottom: 15px; text-align: left; }
        label { font-weight: bold; display: block; margin-bottom: 5px; color: #444; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { background-color: #ff9900; color: white; border: none; padding: 15px; font-size: 18px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; transition: 0.3s; }
        button:hover { background-color: #e68a00; transform: translateY(-2px); }
        #story-box { margin-top: 25px; padding: 20px; border-left: 5px solid #ff9900; background-color: #fffaf0; display: none; text-align: left; border-radius: 4px; }
        #speakBtn { background-color: #007bff; margin-top: 15px; font-size: 16px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>🎓 SPPU AI Animator</h1>
        <p>Generative AI explanations for your syllabus.</p>
        
        <div class="input-group">
            <label>Syllabus Topic:</label>
            <input type="text" id="topicInput" placeholder="e.g., Stack, Binary Tree">
        </div>

        <div class="input-group">
            <label>AI Character:</label>
            <input type="text" id="characterInput" placeholder="e.g., Ram the Cat">
        </div>
        
        <button onclick="getStoryFromAWS()">Generate Custom Story</button>
        
        <div id="story-box">
            <h2 id="story-title">Loading...</h2>
            <p id="story-text">Please wait...</p>
            <button id="speakBtn" style="display:none;" onclick="speakStory()">🔊 Listen to Story</button>
        </div>
    </div>

    <script>
        let currentStory = "";

        async function getStoryFromAWS() {
            // 🚨 PASTE YOUR AWS FUNCTION URL BELOW 🚨
            const awsUrl = "https://gc7wzz5vx4smd7ab2hhlf3kpey0cxyjx.lambda-url.us-east-1.on.aws/";
            
            const topic = document.getElementById('topicInput').value;
            const character = document.getElementById('characterInput').value;

            document.getElementById('story-box').style.display = "block";
            document.getElementById('story-title').innerText = "Connecting to AWS...";
            document.getElementById('story-text').innerText = "Generating your story...";
            document.getElementById('speakBtn').style.display = "none";

            try {
                const fullUrl = `${awsUrl}?topic=${encodeURIComponent(topic)}&character=${encodeURIComponent(character)}`;
                const response = await fetch(fullUrl);
                
                // 🛠️ THE LOOP-BREAKER: We parse twice to be 100% sure we get an object
                let data = await response.json();
                if (typeof data === "string") {
                    data = JSON.parse(data);
                }
                
                currentStory = data.animation_script || "AI response was empty.";
                document.getElementById('story-title').innerText = `${data.character} teaches ${data.topic}`;
                document.getElementById('story-text').innerText = currentStory;
                document.getElementById('speakBtn').style.display = "block";
            } catch (error) {
                console.error("Error:", error);
                document.getElementById('story-title').innerText = "Connection Failed";
                document.getElementById('story-text').innerText = "Make sure your AWS URL is correct and Timeout is 30s.";
            }
        }

        function speakStory() {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel(); // Stop current speech
                const utterance = new SpeechSynthesisUtterance(currentStory);
                utterance.rate = 0.9;
                window.speechSynthesis.speak(utterance);
            }
        }
    </script>

</body>
</html>
